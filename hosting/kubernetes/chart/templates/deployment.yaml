apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "worknest.fullname" . }}
  labels:
    {{- include "worknest.labels" . | nindent 4 }}
spec:
  {{- if not .Values.worknest.autoscaling.enabled }}
  replicas: {{ .Values.worknest.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "worknest.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.worknest.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "worknest.selectorLabels" . | nindent 8 }}
        {{- with .Values.worknest.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.worknest.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "worknest.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.worknest.image.repository }}:{{ .Values.worknest.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.worknest.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.worknest.service.port }}
              protocol: TCP
          env:
            {{- include "worknest.serverEnvVars" . | nindent 12 }}
{{- $storageType := default "file" .Values.worknest.storage.type }}
{{- $mountFileStorage := eq $storageType "file" }}
{{- $gcsSecret := .Values.worknest.storage.gcs.credentialsSecret }}
{{- $mountGcsCredentials := and (eq $storageType "gcs") $gcsSecret.name }}
{{- $configFile := .Values.worknest.configFile }}
{{- $mountConfigFile := or $configFile.enabled $configFile.existingConfigMap }}
{{- $extraVolumeMounts := .Values.worknest.extraVolumeMounts | default (list) }}
{{- $extraVolumes := .Values.worknest.extraVolumes | default (list) }}
{{- $hasExtraVolumeMounts := gt (len $extraVolumeMounts) 0 }}
{{- $hasExtraVolumes := gt (len $extraVolumes) 0 }}
{{- if or $mountFileStorage $mountGcsCredentials $mountConfigFile $hasExtraVolumeMounts }}
          volumeMounts:
{{- if $mountFileStorage }}
            - name: storage-data
              mountPath: {{ required "worknest.storage.file.directory must be set when STORAGE_TYPE is file" .Values.worknest.storage.file.directory }}
{{- end }}
{{- if $mountGcsCredentials }}
            - name: gcs-credentials
              mountPath: {{ required "worknest.storage.gcs.credentialsSecret.mountPath must be set when mounting GCS credentials" $gcsSecret.mountPath }}
              readOnly: true
{{- end }}
{{- if $mountConfigFile }}
            - name: config-json
              mountPath: /config.json
              subPath: {{ default "config.json" $configFile.key }}
              readOnly: true
{{- end }}
{{- if $hasExtraVolumeMounts }}
            {{ include "worknest.renderExtraVolumeMounts" $extraVolumeMounts | nindent 12 }}
{{- end }}
{{- end }}
          resources:
            {{- toYaml .Values.worknest.resources | nindent 12 }}
{{- if or $mountFileStorage $mountGcsCredentials $mountConfigFile $hasExtraVolumes }}
      volumes:
{{- if $mountFileStorage }}
        - name: storage-data
{{- $persistence := .Values.worknest.storage.file.persistence }}
{{- if $persistence.enabled }}
{{- if $persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ $persistence.existingClaim }}
{{- else }}
          persistentVolumeClaim:
            claimName: {{ include "worknest.storagePvcName" . }}
{{- end }}
{{- else }}
          emptyDir: {}
{{- end }}
{{- end }}
{{- if $mountGcsCredentials }}
        - name: gcs-credentials
          secret:
            secretName: {{ $gcsSecret.name }}
            items:
              - key: {{ required "worknest.storage.gcs.credentialsSecret.key must be set when providing a secret" $gcsSecret.key }}
                path: {{ required "worknest.storage.gcs.credentialsSecret.fileName must be set when providing a secret" $gcsSecret.fileName }}
{{- end }}
{{- if $mountConfigFile }}
        - name: config-json
          configMap:
            name: {{ include "worknest.configJsonConfigMapName" . | trim | quote }}
{{- end }}
{{- if $hasExtraVolumes }}
  {{ include "worknest.renderExtraVolumes" $extraVolumes | nindent 8 }}
{{- end }}
{{- end }}
