services:
  postgres:
    image: postgres:16-alpine
    container_name: worknest-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-worknest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-worknest}
      POSTGRES_DB: ${POSTGRES_DB:-worknest}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-worknest} -d ${POSTGRES_DB:-worknest}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - worknest-network

  redis:
    image: redis:7-alpine
    container_name: worknest-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6380}:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - worknest-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: worknest-mailpit
    restart: unless-stopped
    ports:
      - '${MAILPIT_SMTP_PORT:-1025}:1025'
      - '${MAILPIT_UI_PORT:-8025}:8025'
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - worknest-network

  minio:
    image: minio/minio:latest
    container_name: worknest-minio
    restart: unless-stopped
    profiles:
      - s3
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-worknest}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-worknest123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - worknest-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  worknest-network:
    driver: bridge
